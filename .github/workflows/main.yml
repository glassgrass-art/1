1 name: BuildAPK
    2 on:
    3   push:
    4     branches:
    5       - main
    6       - master
    7   workflow_dispatch:
    8 jobs:
    9   build:
   10     runs-on: ubuntu-latest
   11     steps:
   12       - uses: actions/checkout@v3
   13       - name: Set up Java
   14         uses: actions/setup-java@v3
   15         with:
   16           distribution: 'zulu'
   17           java-version: '17'
   18       - name: Set up Flutter
   19         uses: subosito/flutter-action@v2
   20         with:
   21           channel: 'stable'
   22       - name: Install dependencies
   23         run: |
   24           cd flutter_app
   25           flutter pub get
   26       - name: Build APK
   27         run: |
   28           cd flutter_app
   29           flutter build apk --release
   30       - name: Upload APK
   31         uses: actions/upload-artifact@v3
   32         with:
   33           name: release-apk
   34           path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
